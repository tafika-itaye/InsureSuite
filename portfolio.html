<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsureSuite – Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="portfolio-page">

  <header class="suite-header">
    <h1>InsureSuite</h1>
    <div class="user-nav">
      <span id="sessionInfo"></span> •
      <a href="index.html">Logout</a>
    </div>
  </header>

  <nav class="main-menu">
    <a href="dashboard.html" class="menu-item">Dashboard</a>
    <a href="claims.html" class="menu-item">Claims</a>
    <a href="policies.html" class="menu-item">Policies</a>
    <a href="crm.html" class="menu-item">CRM & Renewals</a>
    <a href="portfolio.html" class="menu-item active">Portfolio</a>
    <a href="documents.html" class="menu-item">Documents</a>
    <a href="admin.html" class="menu-item">Admin</a>
  </nav>

  <main class="page-main">

    <section class="section-header">
      <h2>Portfolio Transfer Control</h2>
      <button id="newTransferBtn" class="btn btn-primary">New Transfer</button>
    </section>

    <div id="transferFormWrap" class="form-card" style="display:none;">
      <h3>Initiate Transfer</h3>
      <form id="transferForm">
        <div class="form-row">
          <label>Type</label>
          <select id="transferType" required>
            <option value="Policy">Policy</option>
            <option value="Claim">Claim</option>
            <option value="Customer">Customer</option>
          </select>
        </div>
        <div class="form-row">
          <label>Reference</label>
          <input type="text" id="transferRef" required placeholder="Policy # or Claim #" />
        </div>
        <div class="form-row">
          <label>To</label>
          <input type="text" id="transferTo" required placeholder="Target branch or user" />
        </div>
        <div class="form-row">
          <label>Reason</label>
          <textarea id="transferReason" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <button type="submit" class="btn btn-primary">Save Transfer</button>
          <button type="button" id="cancelTransferBtn" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>

    <table id="transferTable" class="data-table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Reference</th>
          <th>From</th>
          <th>To</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </main>

  <script>
        // DUMMY DATA FOR PORTFOLIO PAGE
    window.data = {
      branches: [
        { id: 1, name: "Head Office – Blantyre", code: "BO" },
        { id: 2, name: "Lilongwe Branch", code: "LW" },
        { id: 3, name: "Mzuzu Branch", code: "MZ" }
      ],
      transfers: [
        { id: 1, type: "Policy", ref: "POL-2025-002", from: "Blantyre", to: "Lilongwe", status: "Pending", reason: "Client relocated" },
        { id: 2, type: "Claim",  ref: "CLM-2025-003", from: "Blantyre", to: "Mzuzu",   status: "Confirmed", reason: "Claims load balancing" },
        { id: 3, type: "Policy", ref: "POL-2025-004", from: "Mzuzu",    to: "Blantyre", status: "Pending", reason: "Senior underwriter review" }
      ]
    };

    // APP LOGIC
    const app = {
      session: null,

      // Load stored session
      loadSession() {
        try {
          const s = localStorage.getItem("insuresuite-session");
          if (s) this.session = JSON.parse(s);
        } catch (e) {
          // ignore invalid JSON
        }
      },

      // Require valid session to show page
      requireSession() {
        if (!this.session) {
          window.location = "index.html";
          return false;
        }
        return true;
      },

      // Set role + branch in header
      setHeader() {
        const el = document.getElementById("sessionInfo");
        if (!el || !this.session) return;
        const branch = window.data.branches.find(b => b.id === this.session.branchId);
        el.textContent = `${this.session.role} • ${branch ? branch.name : "Unknown Branch"}`;
      },

      // Render transfers table
      renderTransfers() {
        const tbody = document.querySelector("#transferTable tbody");
        if (!tbody) return;
        tbody.innerHTML = "";

        window.data.transfers.forEach(t => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${t.type}</td>
            <td>${t.ref}</td>
            <td>${t.from}</td>
            <td>${t.to}</td>
            <td><span class="status-pill ${t.status.toLowerCase()}">${t.status}</span></td>
            <td>
              <button class="btn btn-xs btn-primary" data-id="${t.id}" data-action="confirm">Confirm</button>
              <button class="btn btn-xs btn-secondary" data-id="${t.id}" data-action="view">View</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll("button[data-action]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = parseInt(btn.dataset.id);
            const t = window.data.transfers.find(x => x.id === id);
            if (!t) return;

            if (btn.dataset.action === "confirm") {
              t.status = "Confirmed";
              this.renderTransfers();
            } else if (btn.dataset.action === "view") {
              alert(`Transfer ${t.type} ${t.ref}
From: ${t.from}
To: ${t.to}
Reason: ${t.reason}
Status: ${t.status}`);
            }
          });
        });
      },

      // Transfer form logic
      initForm() {
        const wrap  = document.getElementById("transferFormWrap");
        const form  = document.getElementById("transferForm");

        // Show form
        document.getElementById("newTransferBtn").addEventListener("click", () => {
          wrap.style.display = "block";
        });

        // Hide form
        document.getElementById("cancelTransferBtn").addEventListener("click", () => {
          wrap.style.display = "none";
        });

        // Submit new transfer
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const newId = Math.max(...window.data.transfers.map(t => t.id)) + 1;
          const type   = document.getElementById("transferType").value;
          const ref    = document.getElementById("transferRef").value.trim();
          const to     = document.getElementById("transferTo").value.trim();
          const reason = document.getElementById("transferReason").value.trim();

          window.data.transfers.push({
            id: newId,
            type,
            ref,
            from: this.session ? "Current Branch" : "—",
            to,
            status: "Pending",
            reason
          });

          form.reset();
          wrap.style.display = "none";
          this.renderTransfers();
        });
      },

      // Initialize page
      init() {
        this.loadSession();
        if (!this.requireSession()) return;
        this.setHeader();
        this.renderTransfers();
        this.initForm();
      }
    };

    // Run on page load
    document.addEventListener("DOMContentLoaded", () => app.init());
  </script>
</body>
</html>
