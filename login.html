<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login | InsureSuite</title>
  <link rel="stylesheet" href="css/style.css">
  
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Insure<span>Suite</span></div>
    <p style="text-align:center;color:#6b7c93;font-size:.9rem;margin-bottom:1.5rem;">ERP &amp; Management Portal</p>

    <div class="creds-hint">
      <strong>🔑 Demo Credentials</strong>
      <div class="creds-row"><span>Admin</span><span>admin@insuresuite.mw / Admin@2026</span></div>
      <div class="creds-row"><span>Broker</span><span>broker@insuresuite.mw / Broker@2026</span></div>
      <div class="creds-row"><span>Customer</span><span>customer@insuresuite.mw / Customer@2026</span></div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@insuresuite.mw" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div id="loginError" style="display:none;background:#fee2e2;color:#991b1b;padding:.75rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;">
        ❌ Invalid credentials. Please check and try again.
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In →</button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;font-size:.85rem;color:#6b7c93;">
      Not insured yet? <a href="quotes.html">Get a free quote</a>
    </p>
  </div>
</div>
<script src="js/app.js"></script></body></html>
