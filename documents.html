<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsureSuite – Documents</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="documents-page">

  <header class="suite-header">
    <h1>InsureSuite</h1>
    <div class="user-nav">
      <span id="sessionInfo"></span> •
      <a href="index.html">Logout</a>
    </div>
  </header>

  <nav class="main-menu">
    <a href="dashboard.html" class="menu-item">Dashboard</a>
    <a href="claims.html" class="menu-item">Claims</a>
    <a href="policies.html" class="menu-item">Policies</a>
    <a href="crm.html" class="menu-item">CRM & Renewals</a>
    <a href="portfolio.html" class="menu-item">Portfolio</a>
    <a href="documents.html" class="menu-item active">Documents</a>
    <a href="admin.html" class="menu-item">Admin</a>
  </nav>

  <main class="page-main">

    <section class="section-header">
      <h2>Document & Records Management</h2>
      <button id="newDocBtn" class="btn btn-primary">Upload Document</button>
    </section>

    <div id="docFormWrap" class="form-card" style="display:none;">
      <h3>Upload Document</h3>
      <form id="docForm">
        <div class="form-row">
          <label>Title</label>
          <input type="text" id="docTitle" required />
        </div>
        <div class="form-row">
          <label>Category</label>
          <select id="docCategory" required>
            <option value="Policy">Policy</option>
            <option value="Claim">Claim</option>
            <option value="Customer">Customer</option>
            <option value="General">General</option>
          </select>
        </div>
        <div class="form-row">
          <label>Related Reference</label>
          <input type="text" id="docRef" placeholder="POL-2025-001 / CLM-2025-002" />
        </div>
        <div class="form-row">
          <label>File (Simulated)</label>
          <input type="file" id="docFile" />
        </div>
        <div class="form-row">
          <button type="submit" class="btn btn-primary">Save Document</button>
          <button type="button" id="cancelDocBtn" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>

    <table id="documentsTable" class="data-table">
      <thead>
        <tr>
          <th>Document</th>
          <th>Category</th>
          <th>Reference</th>
          <th>Uploaded By</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </main>

  <script>
        // DUMMY DATA FOR DOCUMENTS PAGE
    window.data = {
      branches: [
        { id: 1, name: "Head Office – Blantyre", code: "BO" },
        { id: 2, name: "Lilongwe Branch", code: "LW" },
        { id: 3, name: "Mzuzu Branch", code: "MZ" }
      ],
      documents: [
        { id: 1, title: "Policy Schedule POL-2025-001", category: "Policy", ref: "POL-2025-001", uploadedBy: "Underwriter" },
        { id: 2, title: "Claim Photos CLM-2025-002",      category: "Claim",  ref: "CLM-2025-002", uploadedBy: "Claims Handler" },
        { id: 3, title: "Customer KYC Form",             category: "Customer", ref: "CUST-001", uploadedBy: "Front Desk" },
        { id: 4, title: "Renewal Quotation POL-2025-004", category: "Policy", ref: "POL-2025-004", uploadedBy: "Underwriter" }
      ]
    };

    // APP LOGIC
    const app = {
      session: null,

      // Load stored session
      loadSession() {
        try {
          const s = localStorage.getItem("insuresuite-session");
          if (s) this.session = JSON.parse(s);
        } catch (e) {
          // ignore invalid JSON
        }
      },

      // Require valid session to show page
      requireSession() {
        if (!this.session) {
          window.location = "index.html";
          return false;
        }
        return true;
      },

      // Set role + branch in header
      setHeader() {
        const el = document.getElementById("sessionInfo");
        if (!el || !this.session) return;
        const branch = window.data.branches.find(b => b.id === this.session.branchId);
        el.textContent = `${this.session.role} • ${branch ? branch.name : "Unknown Branch"}`;
      },

      // Render documents table
      renderDocs() {
        const tbody = document.querySelector("#documentsTable tbody");
        if (!tbody) return;
        tbody.innerHTML = "";

        window.data.documents.forEach(doc => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${doc.title}</td>
            <td>${doc.category}</td>
            <td>${doc.ref}</td>
            <td>${doc.uploadedBy}</td>
            <td>
              <button class="btn btn-xs btn-primary" data-id="${doc.id}" data-action="view">View</button>
              <button class="btn btn-xs btn-secondary" data-id="${doc.id}" data-action="delete">Delete</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll("button[data-action]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = parseInt(btn.dataset.id);
            const doc = window.data.documents.find(x => x.id === id);
            if (!doc) return;

            if (btn.dataset.action === "view") {
              alert(`Document: ${doc.title}
Category: ${doc.category}
Reference: ${doc.ref}
Uploaded By: ${doc.uploadedBy}`);
            } else if (btn.dataset.action === "delete") {
              if (confirm(`Delete "${doc.title}"?`)) {
                window.data.documents = window.data.documents.filter(x => x.id !== doc.id);
                this.renderDocs();
              }
            }
          });
        });
      },

      // Document upload form logic
      initForm() {
        const wrap  = document.getElementById("docFormWrap");
        const form  = document.getElementById("docForm");

        // Show form
        document.getElementById("newDocBtn").addEventListener("click", () => {
          wrap.style.display = "block";
        });

        // Hide form
        document.getElementById("cancelDocBtn").addEventListener("click", () => {
          wrap.style.display = "none";
        });

        // Submit new document
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const newId = Math.max(...window.data.documents.map(d => d.id)) + 1;
          const title    = document.getElementById("docTitle").value.trim();
          const category = document.getElementById("docCategory").value;
          const ref      = document.getElementById("docRef").value.trim();
          const uploadedBy = this.session ? this.session.role : "Demo User";

          window.data.documents.push({
            id: newId,
            title,
            category,
            ref: ref || "—",
            uploadedBy
          });

          form.reset();
          wrap.style.display = "none";
          this.renderDocs();
        });
      },

      // Initialize page
      init() {
        this.loadSession();
        if (!this.requireSession()) return;
        this.setHeader();
        this.renderDocs();
        this.initForm();
      }
    };

    // Run on page load
    document.addEventListener("DOMContentLoaded", () => app.init());
  </script>
</body>
</html>
